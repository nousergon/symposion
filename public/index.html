<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>symposion</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="brand">symposion</span>
        <div class="header-actions">
          <button type="button" id="restart-server-btn" class="icon-btn" title="Restart server (picks up latest deployed code)">↻</button>
          <button id="new-agent-btn">+ New Agent</button>
        </div>
      </div>
      <ul id="persona-list"></ul>
    </aside>
    <main class="chat">
      <div class="chat-header" id="chat-header">
        <span class="chat-header-title">
          <span id="chat-header-text">Select or create an agent to begin</span>
          <button type="button" id="rename-btn" class="icon-btn" title="Rename this agent" hidden>✎</button>
        </span>
        <button type="button" id="handoff-btn" class="handoff-btn" title="Hand this session off to Remote Control - continue it from the Claude mobile app or claude.ai/code" hidden>📱 Hand off</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="handoff-card" id="handoff-card" hidden></div>
      <div class="blocked-card" id="blocked-card" hidden></div>
      <div class="background-task-card" id="background-task-card" hidden></div>
      <div class="staged-attachments" id="staged-attachments" hidden></div>
      <form class="chat-input" id="chat-form">
        <input id="chat-file-input" type="file" multiple hidden />
        <button type="button" id="chat-attach-btn" class="attach-btn" title="Attach files" disabled>📎</button>
        <button type="button" id="chat-mic-btn" class="attach-btn" title="Dictate message" disabled hidden>🎤</button>
        <input id="chat-text" type="text" placeholder="Message this agent..." autocomplete="off" disabled />
        <button type="submit" id="chat-send-btn" disabled>Send</button>
      </form>
    </main>
  </div>

  <div class="modal-backdrop" id="new-agent-modal" hidden>
    <div class="modal">
      <h3>New Agent</h3>
      <label>Name</label>
      <div class="name-picker-row">
        <input id="new-agent-name" type="text" placeholder="Random star name" autocomplete="off" />
        <button type="button" id="new-agent-randomize-name" class="icon-btn" title="Pick a different random name">🎲</button>
      </div>
      <label>Backend</label>
      <div class="backend-toggle">
        <button type="button" class="backend-btn active" data-backend="api">API</button>
        <button type="button" class="backend-btn" data-backend="claude-code">Claude Code</button>
      </div>
      <label>Workspace</label>
      <div class="workspace-picker-row">
        <input id="new-agent-workspace" type="text" placeholder="/path/to/any/project" autocomplete="off" />
        <button type="button" id="new-agent-browse-btn">Browse…</button>
      </div>
      <label>Model</label>
      <select id="new-agent-model"></select>
      <label id="new-agent-permission-label" hidden>Permission policy</label>
      <select id="new-agent-permission-mode" hidden></select>
      <div class="modal-actions">
        <button type="button" id="new-agent-cancel">Cancel</button>
        <button type="button" id="new-agent-create">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="dir-browser-modal" hidden>
    <div class="modal dir-browser">
      <h3>Choose a workspace folder</h3>
      <div class="dir-browser-path" id="dir-browser-path"></div>
      <ul class="dir-browser-list" id="dir-browser-list"></ul>
      <div class="modal-actions">
        <button type="button" id="dir-browser-cancel">Cancel</button>
        <button type="button" id="dir-browser-select">Select this folder</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

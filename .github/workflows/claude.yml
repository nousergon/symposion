name: Claude PR Assistant

# Interactive @claude PR/issue assistant (thin caller). Comment
# "@claude <request>" on a PR (Conversation tab), an inline single comment,
# a review, or an issue and Claude responds. Commit-capable.
#
# All behavior (model, tool scope, trusted-author gate) lives in the shared
# reusable workflow. Edit it THERE once; this caller never changes:
#   nousergon/crucible-dashboard/.github/workflows/claude-assistant.yml

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude')
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    uses: nousergon/crucible-dashboard/.github/workflows/claude-assistant.yml@main
    secrets: inherit
